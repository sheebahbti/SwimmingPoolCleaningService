databases:
  - name: poolservice-db
    plan: free
    databaseName: poolservice
    user: poolservice

services:
  - type: web
    name: poolservice
    runtime: node
    plan: free
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci && npm run build
    startCommand: cd backend && npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: poolservice-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
